<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éclat Naturel - Connexion</title>
    <link rel="stylesheet" href="./comptes.css">
    
</head>
<body>
     <header>
<div class="bottom-header">
   <nav class="menu1">
  <a href="">Accueil</a>
  <a href="">Produits</a>
  <a href="">Promotions</a>
  <a href="">Conseils Santé</a>
  <a href="">Mon compte</a>
  <a href="">Panier</a>
</nav> 
</div>
    </header>
    <main>
        <section class="carte-connexion">
            <div class="entete-logo">
                <div class="logo-cercle">
                   <p>🌿</p>
                </div>
                <div class="titre-marque">
                    <h1>Éclat Naturel</h1>
                    <p>Soin naturel, beauté durable</p>
                </div>
            </div>
            <h2 class="souhaite-bienvenue">Créer un compte</h2>
            <p class="instruction">Rejoinez-nous et profitez de nos produits</p>
         <form id="formulaire-connexion">
            <div class="groupe-champ">
                <label for="nom">Nom</label>
                <input type="text" id="nom" placeholder="Votre nom">

            </div>
                <div class="groupe-champ">
                    <label for="courriel">Email</label>
                    <input type="email" id="courriel" placeholder="Votre email">
                </div>
                <div class="groupe-champ">
                    <label for="numero">Télephone</label>
                    <input type="tel" id="numero" placeholder="Votre conctat" >

                </div>

                <div class="groupe-champ">
                    <label for="mot-de-passe">Mot de passe</label>
                    <input type="password" id="mot-de-passe" placeholder="Votre mot de passe">
                </div>

                <button type="submit" class="bouton-connexion" id="bouton_enregistrer">S’ inscrit</button>

            </form> 
            <div class="pied-formulaire">
                <a href="" class="lien-inscription">Déja un compte?</a>
            </div>  
            <p id="messages"></p>
            <p id="erreur"></p>

        </section>



    </main>
</body>
<script src="./compte.js"></script>
</html>
