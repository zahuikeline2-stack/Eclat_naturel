<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éclat Naturel - Connexion</title>
    <link rel="stylesheet" href="./compte.css">
</head>
<body>

    <header>
<div class="bottom-header">
   <nav class="menu1">
  <a href="./index.html">Accueil</a>
  <a href="./produits.html">Produits</a>
  <a href="./promotion.html">Promotions</a>
  <a href="./conseil.html">Conseils Santé</a>
  <a href="./compte.html">Mon compte</a>
  <a href="./panier.html">Panier</a>
</nav> 
</div>
    </header>

    <main class="conteneur-principal">
        <section class="carte-connexion">
            <div class="entete-logo">
                <div class="logo-cercle">
                   <p>🌿</p>
                </div>
                <div class="titre-marque">
                    <h1>Éclat Naturel</h1>
                    <p>Soin naturel, beauté durable</p>
                </div>
            </div>

            <h2 class="souhaite-bienvenue">Bienvenue !</h2>
            <p class="instruction">Connectez-vous à votre compte</p>

            <form id="formulaire-connexion">
                <div class="groupe-champ">
                    <label for="courriel">Email</label>
                    <input type="email" id="courriel" placeholder="Votre email" required>
                </div>

                <div class="groupe-champ">
                    <label for="mot-de-passe">Mot de passe</label>
                    <input type="password" id="mot-de-passe" placeholder="Votre mot de passe" required>
                </div>

                <div class="lien-oubli">
                    <a href="">Mot de passe oublié ?</a>
                </div>

                <button type="submit" class="bouton-connexion">Se connecter</button>
            </form>

            <div class="pied-formulaire">
                <span>Pas encore de compte ?</span>
                <a href="./comptes.html" class="lien-inscription">s'inscrire</a>
            </div>
        </section>
    
    </main>

</body>
<script src="./comptes.js"></script>

</html>
